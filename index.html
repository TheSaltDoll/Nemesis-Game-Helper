<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nemesis">
<title>Nemesis — Game Aid</title>
<link rel="apple-touch-icon" href="nemesis-icon.png">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0c;--surface:#111116;--surface2:#1a1a22;--border:#2a2a35;
  --accent:#c4ff00;--accent-dim:#6b8a00;--danger:#ff3344;--warn:#ff9900;
  --text:#e0e0e8;--text-dim:#6a6a78;
  --queen:#ff3366;--breeder:#cc44ff;--adult:#ff6633;--creeper:#33ccff;--larva:#88cc44;--blank:#555566;
  --font-display:'Orbitron',sans-serif;--font-mono:'Share Tech Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-mono);-webkit-tap-highlight-color:transparent;user-select:none}
body{display:flex;flex-direction:column}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:9999}

header{text-align:center;padding:10px 16px 6px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0f0f14,var(--bg));flex-shrink:0}
header h1{font-family:var(--font-display);font-size:18px;font-weight:900;letter-spacing:6px;text-transform:uppercase;color:var(--accent);text-shadow:0 0 20px rgba(196,255,0,0.3)}
.header-status{margin-top:4px;font-size:16px;letter-spacing:1px;color:var(--text-dim);text-align:center;line-height:1.5}
.header-status .status-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
.header-status span{color:var(--accent)}
.header-status .hl-warn{color:var(--danger)}

.screen{display:none;flex-direction:column;flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.screen.active{display:flex}

.setup-center{justify-content:center;align-items:center;padding:24px;gap:24px}
.setup-title{font-family:var(--font-display);font-size:20px;font-weight:900;letter-spacing:4px;text-transform:uppercase;color:var(--accent);text-shadow:0 0 30px rgba(196,255,0,0.25);text-align:center}
.setup-subtitle{font-size:18px;color:var(--text-dim);letter-spacing:3px;text-transform:uppercase;text-align:center}
.player-select{display:flex;gap:10px}
.player-btn{width:54px;height:54px;border:2px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text-dim);font-family:var(--font-display);font-size:20px;font-weight:700;cursor:pointer;transition:all 0.2s}
.player-btn:hover,.player-btn.selected{border-color:var(--accent);color:var(--accent);background:rgba(196,255,0,0.05);box-shadow:0 0 20px rgba(196,255,0,0.1)}
.nav-btn{padding:12px 40px;border:2px solid var(--accent);border-radius:6px;background:rgba(196,255,0,0.08);color:var(--accent);font-family:var(--font-display);font-size:18px;font-weight:700;letter-spacing:4px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;opacity:0.3;pointer-events:none}
.nav-btn.ready{opacity:1;pointer-events:auto}
.nav-btn.ready:hover{background:rgba(196,255,0,0.15);box-shadow:0 0 30px rgba(196,255,0,0.2)}

.name-form{width:100%;max-width:340px;display:flex;flex-direction:column;gap:12px}
.name-row{display:flex;align-items:center;gap:10px}
.name-row label{font-family:var(--font-display);font-size:18px;font-weight:700;letter-spacing:2px;color:var(--accent);white-space:nowrap;width:90px}
.name-row input{flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-family:var(--font-mono);font-size:18px;outline:none;transition:border-color 0.2s}
.name-row input:focus{border-color:var(--accent)}
.name-row input::placeholder{color:var(--text-dim)}

.setup-info{width:100%;max-width:388px}
.setup-info-section{margin-bottom:16px}
.setup-info-section h3{font-family:var(--font-display);font-size:18px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.setup-info-row{display:flex;justify-content:space-between;padding:4px 0;font-size:18px}
.setup-info-row .lbl{color:var(--text-dim)}
.setup-info-row .val{color:var(--text);text-align:right;max-width:55%}

#main-screen{padding:0}
.phase-banner{text-align:center;padding:8px;font-family:var(--font-display);font-size:18px;letter-spacing:4px;text-transform:uppercase;border-bottom:1px solid var(--border);flex-shrink:0}
.phase-banner.player-phase{color:var(--accent);background:rgba(196,255,0,0.03)}
.phase-banner.event-phase{color:var(--creeper);background:rgba(51,204,255,0.03)}

.urgency-banner{padding:8px 16px;font-size:14px;line-height:1.4;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:8px;overflow:hidden;width:100%}
.urgency-banner .ub-icon{font-size:14px;flex-shrink:0}
.urgency-banner .ub-label{font-family:var(--font-display);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;flex-shrink:0}
.urgency-banner .ub-text{color:var(--text-dim);font-size:12px;min-width:0;word-wrap:break-word}
.ub-sd{background:rgba(255,51,68,0.06);color:var(--danger)}
.ub-sd .ub-text{color:rgba(255,51,68,0.7)}
.ub-alert{background:rgba(255,153,0,0.06);color:var(--warn)}
.ub-alert .ub-text{color:rgba(255,153,0,0.7)}

.actions-area{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:10px 12px;align-content:start}
.section-label{display:none}

.action-btn{width:100%;max-width:none;padding:10px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-family:var(--font-mono);font-size:18px;text-align:left;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden}
.action-btn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.action-btn:hover{border-color:var(--text-dim);background:var(--surface2)}
.action-btn .label{font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;line-height:1.3}
.action-btn .desc{display:none}
.action-btn.stub{opacity:0.35}
.action-btn.stub .label::after{content:' [SOON]';color:var(--text-dim);font-size:8px}

.act-red::before{background:var(--danger)} .act-red .label{color:var(--danger)}
.act-orange::before{background:var(--warn)} .act-orange .label{color:var(--warn)}
.act-cyan::before{background:var(--creeper)} .act-cyan .label{color:var(--creeper)}
.act-green::before{background:var(--accent)} .act-green .label{color:var(--accent)}
.act-purple::before{background:var(--breeder)} .act-purple .label{color:var(--breeder)}
.act-pink::before{background:var(--queen)} .act-pink .label{color:var(--queen)}
.act-dim::before{background:var(--text-dim)} .act-dim .label{color:var(--text-dim)}

.reset-row{padding:6px 20px 8px;text-align:center;flex-shrink:0}
.reset-btn{background:none;border:1px solid #2a1a1a;border-radius:4px;color:#663333;font-family:var(--font-mono);font-size:18px;letter-spacing:2px;padding:5px 14px;cursor:pointer;transition:all 0.2s}
.reset-btn:hover{border-color:var(--danger);color:var(--danger)}

.overlay{display:none;position:fixed;inset:0;z-index:100;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,5,8,0.92);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding:20px;animation:fadeIn 0.2s ease}
.overlay.active{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseGlow{0%,100%{filter:drop-shadow(0 0 10px var(--glow-color))}50%{filter:drop-shadow(0 0 25px var(--glow-color))}}

.result-card{text-align:center;animation:slideUp 0.35s ease;max-width:388px;width:100%;max-height:85vh;overflow-y:auto}
.result-type-label{font-family:var(--font-display);font-size:18px;letter-spacing:4px;text-transform:uppercase;color:var(--text-dim);margin-bottom:12px}
.result-image{width:100%;max-width:260px;border-radius:8px;border:2px solid var(--border);margin:0 auto 12px;display:block;--glow-color:#fff;animation:pulseGlow 2s ease-in-out infinite}
.result-name{font-family:var(--font-display);font-size:22px;font-weight:900;letter-spacing:3px;text-transform:uppercase;margin-bottom:4px}
.result-initiative{font-size:18px;color:var(--text-dim);letter-spacing:2px;margin-bottom:14px}
.result-initiative span{color:var(--accent);font-weight:bold}
.result-message{font-size:18px;color:var(--text-dim);line-height:1.6;margin-bottom:14px;padding:10px 14px;border:1px solid var(--border);border-radius:6px;background:var(--surface);text-align:left}
.result-message em{color:var(--text);font-style:normal}
.result-message.centered{text-align:center}

.overlay-btn{padding:10px 28px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-family:var(--font-display);font-size:18px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all 0.2s;margin:3px}
.overlay-btn:hover{border-color:var(--accent);color:var(--accent)}
.overlay-btn.primary{border-color:var(--accent);color:var(--accent);background:rgba(196,255,0,0.06)}
.overlay-btn.danger{border-color:var(--danger);color:var(--danger)}
.overlay-actions{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-top:6px}

.type-options{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:12px 0}
.type-btn{padding:10px 16px;border:1px solid var(--border);border-radius:6px;background:var(--surface);font-family:var(--font-display);font-size:18px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all 0.2s}
.type-btn:hover{background:var(--surface2)}
.type-btn:disabled{opacity:0.2;pointer-events:none}
.type-btn[data-type="Queen"]{color:var(--queen);border-color:var(--queen)}
.type-btn[data-type="Breeder"]{color:var(--breeder);border-color:var(--breeder)}
.type-btn[data-type="Adult"]{color:var(--adult);border-color:var(--adult)}
.type-btn[data-type="Creeper"]{color:var(--creeper);border-color:var(--creeper)}

.blank-icon{width:80px;height:80px;margin:0 auto 16px;border:2px dashed var(--blank);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:32px;color:var(--blank);opacity:0.6}
.private-prompt{font-size:18px;color:var(--text-dim);margin:12px 0;text-align:center;line-height:1.6}
.reveal-box{padding:16px;border:1px solid var(--accent);border-radius:8px;background:rgba(196,255,0,0.04);margin:12px 0;font-size:18px;color:var(--text);line-height:1.8}

.debug-area{flex-shrink:0;border-top:1px solid var(--border);background:var(--surface);padding:4px 16px}
.debug-toggle{display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer}
.debug-toggle span{font-size:18px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase}
.debug-switch{width:28px;height:14px;border-radius:7px;background:var(--border);position:relative;transition:background 0.2s}
.debug-switch::after{content:'';position:absolute;left:2px;top:2px;width:10px;height:10px;border-radius:50%;background:var(--text-dim);transition:all 0.2s}
.debug-toggle.on .debug-switch{background:var(--accent-dim)}
.debug-toggle.on .debug-switch::after{left:16px;background:var(--accent)}
.debug-contents{display:none;padding:6px 0 2px;font-size:18px;line-height:1.7;color:var(--text-dim);max-height:180px;overflow-y:auto}
.debug-contents.visible{display:block}
.tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:8px;margin:1px;border:1px solid}
.tag-Queen{color:var(--queen);border-color:var(--queen)}
.tag-Breeder{color:var(--breeder);border-color:var(--breeder)}
.tag-Adult{color:var(--adult);border-color:var(--adult)}
.tag-Creeper{color:var(--creeper);border-color:var(--creeper)}
.tag-Larva{color:var(--larva);border-color:var(--larva)}
.tag-Blank{color:var(--blank);border-color:var(--blank)}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ============================================
   TABLET LANDSCAPE (min-width 800px + landscape)
   ============================================ */
@media (min-width:800px) and (orientation:landscape){
  header{padding:6px 24px 4px;display:flex;align-items:center;gap:20px}
  header h1{font-size:16px;letter-spacing:8px;white-space:nowrap}
  .header-status{margin-top:0;font-size:14px;flex:1;text-align:right;line-height:1.3}
  .header-status .status-row{justify-content:flex-end;gap:16px}

  .setup-center{flex-direction:row;flex-wrap:wrap;justify-content:center;align-items:center;gap:20px 40px;padding:24px 48px}
  .setup-title{width:100%;font-size:24px}
  .setup-subtitle{width:100%;font-size:14px}
  .name-form{max-width:500px}
  .name-row label{font-size:14px;width:110px}
  .name-row input{font-size:16px}
  .setup-info{max-width:700px;column-count:2;column-gap:32px}
  .setup-info-section{break-inside:avoid;font-size:14px}
  .setup-info-section h3{font-size:13px}
  .setup-info-row{font-size:14px}
  .nav-btn{font-size:14px;padding:10px 48px}
  .player-btn{width:60px;height:60px;font-size:22px}

  .phase-banner{font-size:12px;letter-spacing:6px;padding:5px}

  .urgency-banner{font-size:14px;padding:6px 24px}
  .urgency-banner .ub-icon{font-size:14px}
  .urgency-banner .ub-label{font-size:11px}
  .urgency-banner .ub-text{font-size:12px}

  .actions-area{display:flex;flex-direction:row;flex-wrap:wrap;justify-content:center;align-content:flex-start;gap:8px;padding:12px 24px;max-width:900px;margin:0 auto;width:100%}
  .section-label{display:block;width:100%;max-width:100%;text-align:center;font-family:var(--font-display);font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);margin-top:8px;padding-left:0}
  .action-btn{width:calc(50% - 8px);max-width:440px;padding:10px 14px;font-size:14px}
  .action-btn .label{font-size:12px;letter-spacing:2px}
  .action-btn .desc{display:block;font-size:11px;color:var(--text-dim);margin-top:2px}

  .reset-row{padding:4px 20px 6px}
  .reset-btn{font-size:12px}

  .overlay{padding:24px}
  .result-card{max-width:600px;max-height:90vh}
  .result-type-label{font-size:13px;margin-bottom:10px}
  .result-name{font-size:24px}
  .result-initiative{font-size:14px}
  .result-message{font-size:14px;padding:12px 16px}
  .result-image{max-width:300px}
  .overlay-btn{font-size:13px;padding:10px 32px}
  .type-btn{font-size:13px;padding:10px 20px}
  .type-options{gap:10px}
  .private-prompt{font-size:14px}
  .reveal-box{font-size:15px}
  .blank-icon{width:70px;height:70px;font-size:28px}

  .debug-area{padding:4px 24px}
  .debug-toggle span{font-size:11px}
  .debug-contents{font-size:11px;max-height:120px}
}
</style>
</head>
<body>
<header>
  <h1>Nemesis</h1>
  <div class="header-status" id="header-status"></div>
</header>

<div class="screen setup-center active" id="setup-count">
  <div class="setup-title">Initialize</div>
  <div class="setup-subtitle">Select number of players</div>
  <div class="player-select" id="player-select"></div>
  <button class="nav-btn" id="btn-to-names">Next</button>
</div>

<div class="screen setup-center" id="setup-names">
  <div class="setup-title">Crew Roster</div>
  <div class="setup-subtitle">Assign player numbers &amp; names</div>
  <div class="name-form" id="name-form"></div>
  <button class="nav-btn ready" id="btn-to-board">Continue</button>
</div>

<div class="screen setup-center" id="setup-board">
  <div class="setup-title">Board Setup</div>
  <div class="setup-subtitle">Place these tiles on the board</div>
  <div class="setup-info" id="setup-info"></div>
  <button class="nav-btn ready" id="btn-start-game">Begin Game</button>
</div>

<div class="screen" id="main-screen">
  <div class="phase-banner player-phase" id="phase-banner">Player Phase</div>
  <div id="urgency-banners"></div>
  <div class="actions-area" id="actions-area"></div>
  <div class="reset-row"><button class="reset-btn" id="reset-btn">Reset Game</button></div>
  <div class="debug-area">
    <div class="debug-toggle" id="debug-toggle"><span>Debug</span><div class="debug-switch"></div></div>
    <div class="debug-contents" id="debug-contents"></div>
  </div>
</div>

<div class="overlay" id="overlay"></div>

<script>
// ============================================================
// AUDIO
// ============================================================
function playSound(file){try{const a=new Audio(file);a.play().catch(()=>{})}catch(e){}}
const MUTHER_SOUNDS=['muther-01.mp3','muther-02.mp3','muther-03.mp3','muther-04.mp3'];
let mutherIndex=0;
function playMuther(){playSound(MUTHER_SOUNDS[mutherIndex]);mutherIndex=(mutherIndex+1)%4}

// ============================================================
// CONSTANTS
// ============================================================
const ALL_TOKENS=[
  {name:'Blank',initiative:0},{name:'Queen',initiative:4},
  {name:'Breeder',initiative:3},{name:'Breeder',initiative:4},
  {name:'Adult',initiative:2},{name:'Adult',initiative:2},{name:'Adult',initiative:2},{name:'Adult',initiative:2},
  {name:'Adult',initiative:3},{name:'Adult',initiative:3},{name:'Adult',initiative:3},{name:'Adult',initiative:3},{name:'Adult',initiative:3},
  {name:'Adult',initiative:4},{name:'Adult',initiative:4},{name:'Adult',initiative:4},
  {name:'Creeper',initiative:1},{name:'Creeper',initiative:1},{name:'Creeper',initiative:1},
  {name:'Larva',initiative:1},{name:'Larva',initiative:1},{name:'Larva',initiative:1},{name:'Larva',initiative:1},
  {name:'Larva',initiative:1},{name:'Larva',initiative:1},{name:'Larva',initiative:1},{name:'Larva',initiative:1},
];
const IMAGE_MAP={Larva:'larva.png',Creeper:'creeper.png',Adult:'adult.png',Breeder:'breeder.png',Queen:'queen.png'};
const COLOR_MAP={Queen:'var(--queen)',Breeder:'var(--breeder)',Adult:'var(--adult)',Creeper:'var(--creeper)',Larva:'var(--larva)',Blank:'var(--blank)'};

const ROOM_TILES=['Airlock Control','Crafting Room','Alarm Room','Shower Room','Server Room','Turret Room','Canteen','Monitoring Room','Command Center','Hatch Control System','Cabins','Engine Control Room'];
const DESTINATIONS=['Earth','Mars','Venus','Deep Space'];

const WEAKNESSES=[
  {name:'Vulnerability to Fire',effect:'When an Intruder suffers an Injury from Fire, Molotov Cocktail, or Flamethrower, it suffers 1 additional injury.'},
  {name:'Species on the Brink of Extinction',effect:'The amount of Injuries needed to kill any Intruder is decreased by 1.'},
  {name:'The Way of Fighting',effect:'If an Adult Intruder attacks you with a "Bite", it deals a Light Wound instead of a Serious Wound.'},
  {name:'The Way of Moving',effect:'Intruders other than the Queen and Breeders cannot destroy Closed Doors.'},
  {name:'Vulnerability to Energy',effect:'Any Energy Weapon Attack that deals at least 1 Injury deals 1 additional Injury.'},
  {name:'Susceptibility to Phosphates',effect:'Each Intruder affected by the Fire Extinguisher or Fire Control System retreats and suffers 1 Injury.'},
  {name:'Vital Places',effect:'"Miss" Combat die results against Adult Intruders are treated as "1 Hit" instead.'},
  {name:'Reaction to Danger',effect:'The value of tokens when checking Surprise Attack is reduced by 1 (to a minimum of 1).'},
];

const EVENTS=[
  {name:'Regeneration',text:'Each Intruder on the board Heals 2 Injuries.',remove:false},
  {name:'Hatching',text:'Discard 1 Egg from the Intruder board. Any Characters in the Nest Room whose players have no Action cards left are Infested by a Larva. If no Character was Infested, put a Larva token into the Intruder bag.',remove:false},
  {name:'Screeching',text:'Place a Noise marker in each Corridor connected to every Room with an Intruder.',remove:false},
  {name:'Scent of Prey',text:'Place a Noise marker in every Corridor connected to a Room containing a Character with a Slime marker (except Corridors that already have Noise markers).',remove:false},
  {name:'Egg Protection',text:'Resolve an Encounter for each Character who is in the Nest or is carrying an Intruder Egg.',remove:false},
  {name:'Lurking',text:'Remove from the board all Intruders which are not in a Room with a Character. Put their respective tokens into the Intruder bag.',remove:false},
  {name:'Eggs Hatching',text:'Place a Larva miniature in each Room with an Egg token. Place 1 Larva miniature in the Nest. Remove all Egg tokens from the main board.',remove:false},
  {name:'Dripping',text:'All Characters in every Room with Technical Corridors get a Slime marker.',remove:false},
  {name:'Infested Supplies',text:'All Characters in Green Rooms add a Contamination Card to their Discard pile.',remove:false},
  {name:'Hunt',text:'Move every Adult Intruder not in Combat to a neighboring Room with a Character, if possible. If there are several Rooms to choose from, move the Adult Intruder to the Room with the lowest Room Number.',remove:false},
  {name:'Eclosion',text:'Each Character with a Larva on their Character board dies (place a Creeper in their Room). Every Character draws 4 cards from their deck and Scans all drawn Contamination cards. If they have at least 1 INFECTED card, put a Larva on their Character board. Discard drawn cards.',remove:false},

function freshState(){return{numPlayers:0,players:[],firstPlayer:1,timeMark:15,bag:[],supply:[],escapePods:[],engines:{1:'',2:'',3:''},coordinates:{},shipDestination:'B',nest:{eggs:5,destroyed:false},weaknesses:{characterCorpse:null,intruderEgg:null,intruderCarcass:null},discoveredWeaknesses:[],discardedWeaknessTypes:[],eventDraw:[],eventDiscard:[],removedEvents:[],alertDeck:[],currentAlert:null,selfDestruct:{active:false,timer:6,unstoppable:false},turretCount:0,malfunctionCount:0,fireCount:0,queenKilled:false,phase:'player',gameOver:false,shuttleRooms:{top:'',middle:'',bottom:''}}}

// ============================================================
// UTILITY
// ============================================================
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function rd(n){return Math.floor(Math.random()*n)}
function deepCopy(a){return a.map(x=>({...x}))}
function getFromSupply(nm){const i=G.supply.findIndex(t=>t.name===nm);if(i===-1)return null;return G.supply.splice(i,1)[0]}
function getRandomFromSupply(nm){const m=G.supply.filter(t=>t.name===nm);if(!m.length)return null;const p=m[rd(m.length)];return G.supply.splice(G.supply.indexOf(p),1)[0]}
function drawFromBag(){if(!G.bag.length)return null;return G.bag.splice(rd(G.bag.length),1)[0]}
function returnToBag(t){G.bag.push(t)}
function returnToSupply(t){G.supply.push(t)}
function supplyCount(nm){return G.supply.filter(t=>t.name===nm).length}
function alivePlayers(){return G.players.filter(p=>p.alive&&!p.inHibernation&&!p.inEscapePod)}
function firstPlayerName(){const p=G.players.find(x=>x.number===G.firstPlayer);return p?p.name:'?'}
function isWeaknessActive(name){
  for(const key of G.discoveredWeaknesses){if(G.weaknesses[key]&&G.weaknesses[key].name===name)return true}
  return false;
}

function initGame(n,players){
  G=freshState();G.numPlayers=n;G.players=players;G.firstPlayer=1;

  // Bag
  G.supply=deepCopy(ALL_TOKENS);G.bag=[];
  G.bag.push(getFromSupply('Blank'));
  for(let i=0;i<4;i++)G.bag.push(getFromSupply('Larva'));
  for(let i=0;i<2;i++)G.bag.push(getFromSupply('Creeper'));
  for(let i=0;i<3;i++){const a=getRandomFromSupply('Adult');if(a)G.bag.push(a)}
  const br=getRandomFromSupply('Breeder');if(br)G.bag.push(br);
  G.bag.push(getFromSupply('Queen'));
  for(let i=0;i<n;i++){const a=getRandomFromSupply('Adult');if(a)G.bag.push(a)}
  shuffle(G.bag);

  // Pods
  let pc=n<=2?1:(n<=4?2:3);
  for(let i=1;i<=pc;i++)G.escapePods.push({id:i,locked:true,launched:false,occupants:[]});

  // Shuttle Rooms
  const tiles=shuffle([...ROOM_TILES]);
  G.shuttleRooms={top:tiles[0],middle:tiles[1],bottom:tiles[2]};

  // Coordinates
  const dests=shuffle([...DESTINATIONS]);
  ['A','B','C','D'].forEach((l,i)=>G.coordinates[l]=dests[i]);
  G.shipDestination='B';

  // Engines
  for(let i=1;i<=3;i++)G.engines[i]=Math.random()<0.5?'Working':'Damaged';

  // Nest
  G.nest={eggs:5,destroyed:false};

  // Weaknesses
  const wk=shuffle([...WEAKNESSES]);
  G.weaknesses={characterCorpse:wk[0],intruderEgg:wk[1],intruderCarcass:wk[2]};

  // Events
  G.eventDraw=shuffle(EVENTS.map(e=>({...e})));G.eventDiscard=[];G.removedEvents=[];

  // Alerts
  G.alertDeck=shuffle(ALERTS.filter(a=>a.minPlayers<=n).map(a=>({...a})));
  G.currentAlert=null;

  G.timeMark=15;
  G.selfDestruct={active:false,timer:6,unstoppable:false};
  G.turretCount=0;G.phase='player';G.gameOver=false;
}

function checkCatastrophe(){
  if(G.malfunctionCount>=9||G.fireCount>=9){
    G.gameOver=true;
    const cause=G.malfunctionCount>=9?'Malfunctions':'Fire';
    let fates=G.players.map(p=>{
      if(!p.alive)return`<span style="color:var(--danger)">${p.name}: Dead</span>`;
      if(p.inEscapePod){const pod=G.escapePods.find(x=>x.occupants.includes(p.number));return`<span style="color:var(--accent)">${p.name}: Escaped (Pod ${pod?pod.id:'?'})</span>`}
      return`<span style="color:var(--danger)">${p.name}: Dead (on ship)</span>`;
    }).join('<br>');
    showOverlay(`<div class="result-card"><div class="result-type-label">Catastrophe</div><div class="result-message centered" style="border-color:var(--danger)"><em style="color:var(--danger)">${cause} have reached 9 \u2014 THE SHIP IS DESTROYED!</em><br><br>Malfunctions: ${G.malfunctionCount} | Fire: ${G.fireCount}<br><br><div style="padding-top:8px;border-top:1px solid var(--border);text-align:left;font-size:11px;line-height:1.8">${fates}</div></div><div class="overlay-actions"><button class="overlay-btn primary" onclick="hideOverlay();updateUI()">End Game</button></div></div>`);
    return true;
  }
  return false;
}

function checkAllPlayersGone(){
  const anyActive=G.players.some(p=>p.alive&&!p.inHibernation&&!p.inEscapePod);
  if(anyActive)return;
  G.gameOver=true;
  let summary='<em style="color:var(--danger)">All players have left the ship. The game is over!</em>';
  if(G.selfDestruct.active){
    summary+='<br><br><em style="color:var(--danger)">The Self-Destruct was active \u2014 the ship is DESTROYED!</em>';
  } else {
    summary+='<br><br>'+buildShipSummary();
  }
  // Player fates
  let fates=G.players.map(p=>{
    if(!p.alive) return `<span style="color:var(--danger)">${p.name}: Dead</span>`;
    if(p.inHibernation) return `<span style="color:var(--breeder)">${p.name}: Hibernation</span>`;
    if(p.inEscapePod){
      const pod=G.escapePods.find(x=>x.occupants.includes(p.number));
      return `<span style="color:var(--accent)">${p.name}: Escaped (Pod ${pod?pod.id:'?'})</span>`;
    }
    return `<span style="color:var(--text-dim)">${p.name}: Unknown</span>`;
  }).join('<br>');
  summary+='<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);text-align:left;font-size:18px;line-height:1.8">'+fates+'</div>';

  showOverlay(`<div class="result-card"><div class="result-type-label">Game Over</div><div class="result-message centered">${summary}</div><div class="overlay-actions"><button class="overlay-btn primary" onclick="hideOverlay();updateUI()">End Game</button></div></div>`);
}

// ============================================================
// ENCOUNTER
// ============================================================
function doEncounter(){
  if(!G.bag.length){msg('Encounter','The bag is empty.');return}
  const t=drawFromBag();
  if(t.name==='Blank'){
    const wasLast=G.bag.length===0;
    returnToBag(t);let added=false;
    if(wasLast){const a=getRandomFromSupply('Adult');if(a){returnToBag(a);added=true}}
    let m='No intruder appears. The Blank token is returned to the bag.';
    if(added)m+='<br><br><em>The Blank was the last token \u2014 a random Adult has been added to the bag.</em>';
    showOverlay(`<div class="result-card"><div class="result-type-label">Encounter</div><div class="blank-icon">\u2205</div><div class="result-name" style="color:var(--blank)">Blank</div><div class="result-message centered">${m}</div><div class="overlay-actions"><button class="overlay-btn primary" onclick="hideOverlay()">OK</button></div></div>`);
  } else {
    returnToSupply(t);const c=COLOR_MAP[t.name];
    let dispInit=t.initiative;
    let initNote='';
    if(isWeaknessActive('Reaction to Danger')){dispInit=Math.max(1,dispInit-1);initNote='<br><span style="color:var(--warn);font-size:18px">(Reaction to Danger: \u22121 initiative)</span>'}
    showOverlay(`<div class="result-card"><div class="result-type-label">Encounter</div><img class="result-image" src="${IMAGE_MAP[t.name]}" alt="${t.name}" style="--glow-color:${c};border-color:${c}" onerror="this.style.display='none'"><div class="result-name" style="color:${c}">${t.name}</div><div class="result-initiative">Initiative: <span>${dispInit}</span>${initNote}</div><div class="result-message centered">This token is returned to the supply.</div><div class="overlay-actions"><button class="overlay-btn primary" onclick="hideOverlay()">OK</button></div></div>`);
  }
}

// BAG DEVELOPMENT
// ============================================================
function doBagDev(){
  if(!G.bag.length){msg('Bag Development','The bag is empty.');return}
  const t=drawFromBag(),c=COLOR_MAP[t.name];
  if(t.name==='Larva'){
    returnToSupply(t);const a=getRandomFromSupply('Adult');
    let m='Larva removed to supply.';if(a){returnToBag(a);m+=` An <em>Adult</em> (init ${a.initiative}) added to bag.`}else m+=' No Adults in supply.';
    showOverlay(`<div class="result-card"><div class="result-type-label">Bag Development</div><div class="result-name" style="color:${c}">${t.name}</div><div class="result-initiative">Initiative: <span>${t.initiative}</span></div><div class="result-message centered">${m}</div><div class="overlay-actions"><button class="overlay-btn primary" onclick="hideOverlay()">OK</button></div></div>`);
  } else if(t.name==='Creeper'){
    returnToSupply(t);const b=getRandomFromSupply('Breeder');
    let m='Creeper removed to supply.';if(b){returnToBag(b);m+=` A <em>Breeder</em> (init ${b.initiative}) added to bag.`}else m+=' No Breeders in supply.';
    showOverlay(`<div class="result-card"><div class="result-type-label">Bag Development</div><div class="result-name" style="color:${c}">${t.name}</div><div class="result-initiative">Initiative: <span>${t.initiative}</span></div><div class="result-message centered">${m}</div><div class="overlay-actions"><button class="overlay-btn primary" onclick="hideOverlay()">OK</button></div></div>`);
  } else if(t.name==='Adult'||t.name==='Breeder'){
    returnToBag(t);
    showOverlay(`<div class="result-card"><div class="result-type-label">Bag Development</div><div class="result-name" style="color:${c}">${t.name}</div><div class="result-initiative">Initiative: <span>${t.initiative}</span></div><div class="result-message centered">${t.name} returned to the bag. No change.</div><div class="overlay-actions"><button class="overlay-btn primary" onclick="hideOverlay()">OK</button></div></div>`);
  } else if(t.name==='Blank'){
    returnToBag(t);const a=getRandomFromSupply('Adult');
    let m='Blank returned to the bag.';if(a){returnToBag(a);m+=` A random <em>Adult</em> (init ${a.initiative}) added to bag.`}else m+=' No Adults in supply.';
    showOverlay(`<div class="result-card"><div class="result-type-label">Bag Development</div><div class="blank-icon">\u2205</div><div class="result-name" style="color:var(--blank)">Blank</div><div class="result-message centered">${m}</div><div class="overlay-actions"><button class="overlay-btn primary" onclick="hideOverlay()">OK</button></div></div>`);
  } else if(t.name==='Queen'){
    window._pq=t;
    showOverlay(`<div class="result-card"><div class="result-type-label">Bag Development</div><div class="result-name" style="color:${c}">Queen</div><div class="result-initiative">Initiative: <span>${t.initiative}</span></div><div class="result-message centered">Are there any Characters in the <em>Nest Room</em>?</div><div class="overlay-actions"><button class="overlay-btn danger" onclick="queenNest(true)">Yes</button><button class="overlay-btn" onclick="queenNest(false)">No</button></div></div>`);

window.queenNest=function(yes){
  const t=window._pq;

  else{returnToBag(t);if(!G.nest.destroyed)G.nest.eggs++;updateUI();showOverlay(`<div class="result-card"><div class="result-type-label">Bag Development</div><div class="result-name" style="color:var(--queen)">Queen</div><div class="result-message centered">Queen returned to the bag.<br><br><em style="color:var(--warn)">An Egg has been added to the Nest.</em> (Eggs: ${G.nest.eggs})</div><div class="overlay-actions"><button class="overlay-btn primary" onclick="hideOverlay()">OK</button></div></div>`);}
  window._pq=null;
};

// ============================================================
// LOCK/UNLOCK POD
// ============================================================
function doLockPod(){
  const pods=G.escapePods.filter(p=>!p.launched);
  if(!pods.length){msg('Escape Pods','No un-launched escape pods.');return}
  const btns=pods.map(p=>{const c=p.locked?'var(--danger)':'var(--accent)';return`<button class="type-btn" style="color:${c};border-color:${c}" onclick="togglePod(${p.id})">Pod ${p.id}: ${p.locked?'Locked':'Unlocked'}</button>`}).join('');
  showOverlay(`<div class="result-card"><div class="result-type-label">Escape Pods</div><div class="private-prompt">Tap to toggle lock status:</div><div class="type-options">${btns}</div><div class="overlay-actions"><button class="overlay-btn" onclick="hideOverlay()">Done</button></div></div>`);
}
window.togglePod=function(id){G.escapePods.find(x=>x.id===id).locked=!G.escapePods.find(x=>x.id===id).locked;doLockPod()};

// ============================================================
// ENTER POD
// ============================================================
function doEnterPod(){
  const av=G.escapePods.filter(p=>!p.launched&&!p.locked&&p.occupants.length<2);
  if(!av.length){msg('Enter Escape Pod','No unlocked pods with room available.');return}
  const alive=alivePlayers();if(!alive.length){msg('Enter Escape Pod','No eligible players.');return}
  const btns=av.map(p=>`<button class="type-btn" style="color:var(--breeder);border-color:var(--breeder)" onclick="pickPodPlayer(${p.id})">Pod ${p.id} (${p.occupants.length}/2)</button>`).join('');
  showOverlay(`<div class="result-card"><div class="result-type-label">Enter Escape Pod</div><div class="private-prompt">Select pod:</div><div class="type-options">${btns}</div><div class="overlay-actions"><button class="overlay-btn" onclick="hideOverlay()">Cancel</button></div></div>`);
}
window.pickPodPlayer=function(pid){
  const pod=G.escapePods.find(x=>x.id===pid);const spots=2-pod.occupants.length;
  const alive=alivePlayers().filter(p=>!pod.occupants.includes(p.number));
  const btns=alive.map(p=>`<button class="type-btn" style="color:var(--text);border-color:var(--accent)" onclick="addToPod(${pid},${p.number})">${p.name} (P${p.number})</button>`).join('');
  showOverlay(`<div class="result-card"><div class="result-type-label">Pod ${pid} \u2014 ${spots} spot(s)</div><div class="type-options">${btns}</div><div class="overlay-actions"><button class="overlay-btn" onclick="hideOverlay()">Done</button></div></div>`);
};
window.addToPod=function(pid,pnum){
  const pod=G.escapePods.find(x=>x.id===pid),pl=G.players.find(p=>p.number===pnum);
  pod.occupants.push(pnum);pl.inEscapePod=true;
  if(pod.occupants.length<2)pickPodPlayer(pid);
  else msg('Pod '+pid,'Pod full: '+pod.occupants.map(n=>G.players.find(p=>p.number===n).name).join(', '));
};

// ============================================================
// LAUNCH POD
// ============================================================
function doLaunchPod(){
  const occ=G.escapePods.filter(p=>!p.launched&&p.occupants.length>0);
  if(!occ.length){msg('Launch Pod','No occupied un-launched pods.');return}
  const btns=occ.map(p=>`<button class="type-btn" style="color:var(--warn);border-color:var(--warn)" onclick="confirmLaunch(${p.id})">Pod ${p.id} (${p.occupants.map(n=>G.players.find(x=>x.number===n).name).join(', ')})</button>`).join('');
  showOverlay(`<div class="result-card"><div class="result-type-label">Launch Escape Pod</div><div class="type-options">${btns}</div><div class="overlay-actions"><button class="overlay-btn" onclick="hideOverlay()">Cancel</button></div></div>`);
}
window.confirmLaunch=function(pid){
  const pod=G.escapePods.find(x=>x.id===pid);
  const names=pod.occupants.map(n=>G.players.find(p=>p.number===n).name).join(', ');
  showOverlay(`<div class="result-card"><div class="result-type-label">Launch Pod ${pid}</div><div class="result-message centered" style="border-color:var(--warn)">Launch with <em>${names}</em>?</div><div class="overlay-actions"><button class="overlay-btn danger" onclick="launchPod(${pid})">Launch</button><button class="overlay-btn" onclick="hideOverlay()">Cancel</button></div></div>`);
};
window.launchPod=function(pid){
  const pod=G.escapePods.find(x=>x.id===pid);pod.launched=true;
  const names=pod.occupants.map(n=>G.players.find(p=>p.number===n).name).join(', ');
  showOverlay(`<div class="result-card"><div class="result-type-label">Pod Launched</div><div class="result-message centered">Pod ${pid} launched! <em>${names}</em> have escaped.</div><div class="overlay-actions"><button class="overlay-btn primary" onclick="hideOverlay();checkAllPlayersGone()">OK</button></div></div>`);

// ============================================================
// DISCOVER WEAKNESS
// ============================================================
function doWeakness(){
  const types=[{k:'characterCorpse',l:'Character Corpse'},{k:'intruderEgg',l:'Intruder Egg'},{k:'intruderCarcass',l:'Intruder Carcass'}];
  const btns=types.map(t=>{
    const disc=G.discoveredWeaknesses.includes(t.k);
    const gone=G.discardedWeaknessTypes.includes(t.k);
    const disabled=disc||gone;
    const label=gone?t.l+' (lost)':disc?t.l+' \u2713':t.l;
    const col=disabled?'var(--text-dim)':'var(--warn)';const bc=disabled?'var(--border)':'var(--warn)';
    return`<button class="type-btn" style="color:${col};border-color:${bc}" ${disabled?'disabled':''} onclick="revealWeak('${t.k}')">${label}</button>`;
  }).join('');
  let discovered='';
  if(G.discoveredWeaknesses.length){
    const items=G.discoveredWeaknesses.map(k=>{const t=types.find(x=>x.k===k);const w=G.weaknesses[k];return`<div style="padding:6px 0;border-bottom:1px solid var(--border)"><div style="color:var(--warn);font-size:12px;font-weight:bold">${t?t.l:k}</div><div style="color:var(--accent);font-size:11px;margin-top:2px">${w.name}</div><div style="color:var(--text-dim);font-size:10px;margin-top:2px">${w.effect}</div></div>`}).join('');
    discovered=`<div class="result-message" style="margin-top:12px;text-align:left"><div style="font-family:var(--font-display);font-size:9px;letter-spacing:3px;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase">Discovered</div>${items}</div>`;
  }
  showOverlay(`<div class="result-card"><div class="result-type-label">Discover Weakness</div><div class="type-options">${btns}</div>${discovered}<div class="overlay-actions"><button class="overlay-btn" onclick="hideOverlay()">Cancel</button></div></div>`);
}
window.revealWeak=function(k){
  G.discoveredWeaknesses.push(k);const w=G.weaknesses[k];
  showOverlay(`<div class="result-card"><div class="result-type-label">Weakness Discovered</div><div class="result-name" style="color:var(--warn);font-size:18px">${w.name}</div><div class="result-message">${w.effect}</div><div class="overlay-actions"><button class="overlay-btn primary" onclick="hideOverlay()">OK</button></div></div>`);
};

// ============================================================
// PLAYER DIES
// ============================================================
function doPlayerDies(){
  const alive=G.players.filter(p=>p.alive);
  if(!alive.length){msg('Player Dies','No living players.');return}
  const btns=alive.map(p=>`<button class="type-btn" style="color:var(--danger);border-color:var(--danger)" onclick="confirmDeath(${p.number})">${p.name} (P${p.number})</button>`).join('');
  showOverlay(`<div class="result-card"><div class="result-type-label">Player Dies</div><div class="type-options">${btns}</div><div class="overlay-actions"><button class="overlay-btn" onclick="hideOverlay()">Cancel</button></div></div>`);
}
window.confirmDeath=function(n){
  showOverlay(`<div class="result-card"><div class="result-type-label">Confirm</div><div class="result-message centered" style="border-color:var(--danger)"><em>${G.players.find(x=>x.number===n).name}</em> has died?</div><div class="overlay-actions"><button class="overlay-btn danger" onclick="killPlayer(${n})">Confirm</button><button class="overlay-btn" onclick="hideOverlay()">Cancel</button></div></div>`);
};
window.killPlayer=function(n){
  G.players.find(x=>x.number===n).alive=false;
  G.escapePods.forEach(p=>{if(!p.launched)p.locked=false});
  showOverlay(`<div class="result-card"><div class="result-type-label">Player Died</div><div class="result-message centered"><em style="color:var(--danger)">${G.players.find(x=>x.number===n).name}</em> is dead.<br><br><em style="color:var(--warn)">All Escape Pods unlocked.</em></div><div class="overlay-actions"><button class="overlay-btn primary" onclick="hideOverlay();checkAllPlayersGone()">OK</button></div></div>`);
};

// ============================================================
// EXPLORE ROOM
// ============================================================
function doExplore(){
  const results=[],gw={};
  ROOM_EXPLORE.forEach(item=>{
    if(item.limited&&G.turretCount>=item.maxTotal)return;
    if(Math.random()*20<item.prob){
      if(item.group){if(!gw[item.group]){gw[item.group]=item;results.push(item)}}
      else results.push(item);
    }
  });
  // Item count: 1(20%), 2(30%), 3(30%), 4(20%)
  const itemRoll=Math.random();
  const itemCount=itemRoll<0.2?1:itemRoll<0.5?2:itemRoll<0.8?3:4;

  let html=`<div style="padding:6px 0;border-bottom:1px solid var(--border);color:var(--accent)">Items available: <em>${itemCount}</em></div>`;
  if(!results.length){
    html+=`<div style="padding:6px 0;color:var(--text-dim)">No other discoveries.</div>`;
  }
  let hasTurret=false;let turretStatus='';
  results.forEach(r=>{
    let extra='';
    if(r.name==='Malfunction'){G.malfunctionCount++;extra=` <span style="color:var(--text-dim)">(Total: ${G.malfunctionCount})</span>`}
    if(r.name==='Fire'){G.fireCount++;extra=` <span style="color:var(--text-dim)">(Total: ${G.fireCount})</span>`}
    if(r.name==='Turret'){hasTurret=true;turretStatus=TURRET_STATUSES[rd(3)];extra=`<br>Status: <em style="color:var(--accent)">${turretStatus}</em><br><span style="color:var(--warn);font-size:14px">Turrets cannot be placed in the Nest or Room Covered with Slime.</span>`}
    html+=`<div style="padding:6px 0;border-bottom:1px solid var(--border)">${r.name}${extra}</div>`;
  });
  updateUI();
  if(hasTurret){
    showOverlay(`<div class="result-card"><div class="result-type-label">Explore Room</div><div class="result-name" style="color:var(--creeper);font-size:18px">Results</div><div class="result-message">${html}</div><div class="private-prompt">Was a Turret placed?</div><div class="overlay-actions"><button class="overlay-btn primary" onclick="G.turretCount++;updateUI();hideOverlay();checkCatastrophe()">Yes, Turret Placed</button><button class="overlay-btn" onclick="hideOverlay();checkCatastrophe()">No</button></div></div>`);
  } else {
    showOverlay(`<div class="result-card"><div class="result-type-label">Explore Room</div><div class="result-name" style="color:var(--creeper);font-size:18px">Results</div><div class="result-message">${html}</div><div class="overlay-actions"><button class="overlay-btn primary" onclick="hideOverlay();checkCatastrophe()">OK</button></div></div>`);
  }
}

// ============================================================
// ATTACK INTRUDER
// ============================================================
function doAttack(){
  const types=['Adult','Creeper','Queen','Breeder'];
  const btns=types.map(t=>{
    const dis=(t==='Queen'&&G.queenKilled)?'disabled':'';
    return`<button class="type-btn" data-type="${t}" ${dis} onclick="rollHealth('${t}')">${t}${t==='Queen'&&G.queenKilled?' (dead)':''}</button>`;
  }).join('');
  showOverlay(`<div class="result-card"><div class="result-type-label">Attack Intruder</div><div class="private-prompt">What type is being attacked?</div><div class="type-options">${btns}</div><div class="overlay-actions"><button class="overlay-btn" onclick="hideOverlay()">Cancel</button></div></div>`);
}
window.rollHealth=function(type){
  const roll=rd(20),table=(type==='Adult'||type==='Creeper')?HEALTH_AC:HEALTH_QB;
  let result=table[roll];
  const c=COLOR_MAP[type];
  let weakNote='';
  if(result!=='Retreat'&&isWeaknessActive('Species on the Brink of Extinction')){result=Math.max(1,result-1);weakNote='<br><span style="color:var(--warn);font-size:18px">(Species on the Brink: \u22121 health)</span>'}
  if(result==='Retreat'){
    const corr=rd(4)+1;
    showOverlay(`<div class="result-card"><div class="result-type-label">Attack \u2014 ${type}</div><div class="result-name" style="color:${c}">${type}</div><div class="result-message centered">The ${type} <em style="color:var(--warn)">RETREATS</em>!<br>Corridor: <em style="color:var(--accent);font-size:16px">${corr}</em><br><span style="color:var(--text-dim);font-size:18px">Roll: ${roll+1}/20</span></div><div class="overlay-actions"><button class="overlay-btn primary" onclick="hideOverlay()">OK</button></div></div>`);
  } else {
    // For Queen: ask if killed
    const queenAsk=(type==='Queen')?`<div class="overlay-actions" style="margin-top:10px"><button class="overlay-btn danger" onclick="queenKilled()">Queen Was Killed</button></div>`:'';
    showOverlay(`<div class="result-card"><div class="result-type-label">Attack \u2014 ${type}</div><div class="result-name" style="color:${c}">${type}</div><div class="result-message centered">Health: <em style="color:var(--danger);font-size:20px">${result}</em>${weakNote}<br><span style="color:var(--text-dim);font-size:18px">Roll: ${roll+1}/20</span></div>${queenAsk}<div class="overlay-actions"><button class="overlay-btn primary" onclick="hideOverlay()">OK</button></div></div>`);
  }
};
window.queenKilled=function(){
  G.queenKilled=true;
  // Remove queen token from bag and supply entirely
  G.bag=G.bag.filter(t=>t.name!=='Queen');
  G.supply=G.supply.filter(t=>t.name!=='Queen');
  updateUI();
  msg('Queen Killed','The Queen has been killed! Her token is removed from the game.');
};

// ============================================================
// INTRUDER ATTACKS
// ============================================================
function doIntruderAttack(){
  const types=['Adult','Queen','Breeder','Creeper'];
  const btns=types.map(t=>`<button class="type-btn" data-type="${t}" onclick="rollIntruderAttack('${t}')">${t}</button>`).join('');
  showOverlay(`<div class="result-card"><div class="result-type-label">Intruder Attacks</div><div class="private-prompt">What type of Intruder is attacking?</div><div class="type-options">${btns}</div><div class="overlay-actions"><button class="overlay-btn" onclick="hideOverlay()">Cancel</button></div></div>`);
}
window.rollIntruderAttack=function(type){
  const roll=rd(20),c=COLOR_MAP[type];
  let result=ATTACK_TABLE[type][roll];
  let weakNote='';
  if(result.startsWith('Summon')){
    doSummonDraw('hideOverlay()','OK');
    return;
  }
  if(result.startsWith('Transformation')){
    showTransformationResult(result,roll,'hideOverlay()','OK');
    return;
  }
  if(result.startsWith('Bite')&&isWeaknessActive('The Way of Fighting')){
    result='Bite: 1 Light Wound (Way of Fighting)';
    weakNote='<br><span style="color:var(--warn);font-size:18px">(The Way of Fighting: Bite deals Light Wound)</span>';
  }
  const isMiss=result==='-- miss --';
  const col=isMiss?'var(--text-dim)':result.includes('Frenzy')||result.includes('Tail')||result.includes('Serious')?'var(--danger)':'var(--warn)';
  showOverlay(`<div class="result-card"><div class="result-type-label">Intruder Attack \u2014 ${type}</div><div class="result-name" style="color:${c};font-size:18px">${type}</div><div class="result-message centered"><span style="color:${col};font-size:18px">${result}</span>${weakNote}<br><br><span style="color:var(--text-dim);font-size:18px">Roll: ${roll+1}/20</span></div><div class="overlay-actions"><button class="overlay-btn primary" onclick="hideOverlay()">OK</button></div></div>`);
};

// ============================================================
// SUMMON — Bag draw with no subsequent attack
// ============================================================
function doSummonDraw(returnAction,label){
  if(!G.bag.length){
    showOverlay(`<div class="result-card"><div class="result-type-label">Summon</div><div class="result-message centered">The bag is empty. No token to draw.</div><div class="overlay-actions"><button class="overlay-btn primary" onclick="${returnAction}">${label}</button></div></div>`);
    return;
  }
  const t=drawFromBag();
  if(t.name==='Blank'){
    const wasLast=G.bag.length===0;
    returnToBag(t);let added=false;
    if(wasLast){const a=getRandomFromSupply('Adult');if(a){returnToBag(a);added=true}}
    let m='<em style="color:var(--blank)">Blank</em> drawn. Returned to the bag.';
    if(added)m+='<br><em>The Blank was the last token \u2014 a random Adult has been added.</em>';
    updateUI();
    showOverlay(`<div class="result-card"><div class="result-type-label">Summon</div><div class="blank-icon">\u2205</div><div class="result-name" style="color:var(--blank)">Blank</div><div class="result-message centered">${m}</div><div class="overlay-actions"><button class="overlay-btn primary" onclick="${returnAction}">${label}</button></div></div>`);
  } else {
    returnToSupply(t);const c=COLOR_MAP[t.name];
    let dispInit=t.initiative;let initNote='';
    if(isWeaknessActive('Reaction to Danger')){dispInit=Math.max(1,dispInit-1);initNote='<br><span style="color:var(--warn);font-size:12px">(Reaction to Danger: \u22121 initiative)</span>'}
    updateUI();
    showOverlay(`<div class="result-card"><div class="result-type-label">Summon</div><img class="result-image" src="${IMAGE_MAP[t.name]}" alt="${t.name}" style="--glow-color:${c};border-color:${c}" onerror="this.style.display='none'"><div class="result-name" style="color:${c}">${t.name}</div><div class="result-initiative">Initiative: <span>${dispInit}</span>${initNote}</div><div class="result-message centered">Summoned! Token returned to supply.<br><em style="color:var(--text-dim)">No attack from this draw.</em></div><div class="overlay-actions"><button class="overlay-btn primary" onclick="${returnAction}">${label}</button></div></div>`);
  }
}

function showTransformationResult(result,roll,returnAction,returnLabel){
  showOverlay(`<div class="result-card"><div class="result-type-label">Intruder Attack \u2014 Creeper</div><div class="result-name" style="color:var(--creeper);font-size:18px">Creeper</div><div class="result-message centered"><span style="color:var(--warn);font-size:14px">${result}</span><br><br><span style="color:var(--text-dim);font-size:12px">Roll: ${roll+1}/20</span></div><div class="private-prompt">Does the new Breeder Attack?</div><div class="overlay-actions"><button class="overlay-btn danger" onclick="doBreederFollowUp('${returnAction}','${returnLabel}')">Yes, Breeder Attacks</button><button class="overlay-btn" onclick="${returnAction}">${returnLabel}</button></div></div>`);
}

window.doBreederFollowUp=function(returnAction,returnLabel){
  const roll=rd(20),c=COLOR_MAP['Breeder'];
  let result=ATTACK_TABLE['Breeder'][roll];
  let weakNote='';
  if(result.startsWith('Summon')){
    doSummonDraw(returnAction,returnLabel);
    return;
  }
  if(result.startsWith('Bite')&&isWeaknessActive('The Way of Fighting')){
    result='Bite: 1 Light Wound (Way of Fighting)';
    weakNote='<br><span style="color:var(--warn);font-size:12px">(The Way of Fighting: Bite deals Light Wound)</span>';
  }
  const isMiss=result==='-- miss --';
  const col=isMiss?'var(--text-dim)':result.includes('Frenzy')||result.includes('Tail')||result.includes('Serious')?'var(--danger)':'var(--warn)';
  showOverlay(`<div class="result-card"><div class="result-type-label">Breeder Attack (Transformed)</div><div class="result-name" style="color:${c};font-size:18px">Breeder</div><div class="result-message centered"><span style="color:${col};font-size:14px">${result}</span>${weakNote}<br><br><span style="color:var(--text-dim);font-size:12px">Roll: ${roll+1}/20</span></div><div class="overlay-actions"><button class="overlay-btn primary" onclick="${returnAction}">${returnLabel}</button></div></div>`);
};

// ============================================================
// EVENT PHASE — GUIDED WALKTHROUGH
// ============================================================
function doEndPlayerPhase(){
  showOverlay(`<div class="result-card"><div class="result-type-label">End Player Phase</div><div class="result-message centered">Proceed to the <em style="color:var(--creeper)">Event Phase</em>?</div><div class="overlay-actions"><button class="overlay-btn primary" onclick="startEventPhase()">Begin Event Phase</button><button class="overlay-btn" onclick="hideOverlay()">Cancel</button></div></div>`);
}

window.startEventPhase=function(){
  G.phase='event';updateUI();
  eventStep1_TimeMark();
};

// --- STEP 1: Time Marker ---
function eventStep1_TimeMark(){
  G.timeMark--;
  let announcements=[];
  let gameEnd=false;

  if(G.timeMark===8) announcements.push('<em style="color:var(--breeder)">Hibernation Pods are now open!</em>');
  if(G.timeMark<=0){
    G.timeMark=0;
    gameEnd=true;
    announcements.push('<em style="color:var(--danger)">The ship jumps to hyperspace! The game is over.</em>');
    // Players still on ship and not in hibernation die
    const diedOnShip=[];
    G.players.forEach(p=>{
      if(p.alive&&!p.inHibernation&&!p.inEscapePod){p.alive=false;diedOnShip.push(p.name)}
    });
    if(diedOnShip.length) announcements.push('<em style="color:var(--danger)">'+diedOnShip.join(', ')+' — still on the ship — did not survive the jump.</em>');
    if(G.selfDestruct.active){
      announcements.push('<em style="color:var(--danger)">The Self-Destruct was active \u2014 the ship is DESTROYED!</em>');
    } else {
      announcements.push(buildShipSummary());
    }
    // Player fates
    let fates=G.players.map(p=>{
      if(!p.alive) return `<span style="color:var(--danger)">${p.name}: Dead</span>`;
      if(p.inHibernation) return `<span style="color:var(--breeder)">${p.name}: Hibernation</span>`;
      if(p.inEscapePod){const pod=G.escapePods.find(x=>x.occupants.includes(p.number));return `<span style="color:var(--accent)">${p.name}: Escaped (Pod ${pod?pod.id:'?'})</span>`}
      return `<span style="color:var(--text-dim)">${p.name}: Unknown</span>`;
    }).join('<br>');
    announcements.push('<div style="padding-top:8px;border-top:1px solid var(--border);text-align:left;font-size:18px;line-height:1.8">'+fates+'</div>');
  }

  updateUI();
  const annHtml=announcements.length?'<div style="margin-top:8px">'+announcements.join('<br><br>')+'</div>':'';
  if(gameEnd){
    G.gameOver=true;
    showOverlay(`<div class="result-card"><div class="result-type-label">Event Phase \u2014 Time</div><div class="result-message centered">Time Mark: <em style="color:var(--accent);font-size:18px">${G.timeMark}</em>${annHtml}</div><div class="overlay-actions"><button class="overlay-btn primary" onclick="hideOverlay();updateUI()">End Game</button></div></div>`);
    return;
  }
  showOverlay(`<div class="result-card"><div class="result-type-label">Event Phase \u2014 Step 1: Time</div><div class="result-message centered">Time Mark decreased to <em style="color:var(--accent);font-size:18px">${G.timeMark}</em>${annHtml}</div><div class="overlay-actions"><button class="overlay-btn primary" onclick="eventStep2_SelfDestruct()">Next</button></div></div>`);
}

// --- STEP 2: Self-Destruct Timer ---
function eventStep2_SelfDestruct(){
  if(!G.selfDestruct.active){eventStep3_Alert();return}

  G.selfDestruct.timer--;
  let announcements=[];
  let gameEnd=false;

  // Self-destruct audio cues
  if(G.selfDestruct.timer===4)playSound('destruct-04.mp3');
  else if(G.selfDestruct.timer===3)playSound('destruct-03.mp3');
  else if(G.selfDestruct.timer===1)playSound('destruct-01.mp3');
  else if(G.selfDestruct.timer<=0)playSound('destruct-00.mp3');

  if(G.selfDestruct.timer<=3&&!G.selfDestruct.unstoppable){
    G.selfDestruct.unstoppable=true;
    G.escapePods.forEach(p=>{if(!p.launched)p.locked=false});
    announcements.push('<em style="color:var(--danger)">Self-Destruct can no longer be stopped!</em>');
    announcements.push('<em style="color:var(--warn)">All Escape Pods have been unlocked.</em>');
  }
  if(G.selfDestruct.timer<=0){
    G.selfDestruct.timer=0;gameEnd=true;G.gameOver=true;
    // Everyone still on ship dies
    G.players.forEach(p=>{if(p.alive&&!p.inHibernation&&!p.inEscapePod)p.alive=false});
    announcements.push('<em style="color:var(--danger)">SELF-DESTRUCT REACHES ZERO \u2014 THE SHIP IS DESTROYED!</em>');
    let fates=G.players.map(p=>{
      if(!p.alive) return `<span style="color:var(--danger)">${p.name}: Dead</span>`;
      if(p.inHibernation) return `<span style="color:var(--danger)">${p.name}: Hibernation (destroyed)</span>`;
      if(p.inEscapePod){const pod=G.escapePods.find(x=>x.occupants.includes(p.number));return `<span style="color:var(--accent)">${p.name}: Escaped (Pod ${pod?pod.id:'?'})</span>`}
      return `<span style="color:var(--text-dim)">${p.name}: Unknown</span>`;
    }).join('<br>');
    announcements.push('<div style="padding-top:8px;border-top:1px solid var(--border);text-align:left;font-size:18px;line-height:1.8">'+fates+'</div>');
  }

  updateUI();
  const annHtml=announcements.length?'<br><br>'+announcements.join('<br><br>'):'';
  if(gameEnd){
    showOverlay(`<div class="result-card"><div class="result-type-label">Event Phase \u2014 Self-Destruct</div><div class="result-message centered" style="border-color:var(--danger)">Self-Destruct Timer: <em style="color:var(--danger);font-size:18px">${G.selfDestruct.timer}</em>${annHtml}</div><div class="overlay-actions"><button class="overlay-btn primary" onclick="hideOverlay();updateUI()">End Game</button></div></div>`);
    return;
  }
  showOverlay(`<div class="result-card"><div class="result-type-label">Event Phase \u2014 Step 2: Self-Destruct</div><div class="result-message centered" style="border-color:var(--danger)">Self-Destruct Timer: <em style="color:var(--danger);font-size:18px">${G.selfDestruct.timer}</em>${annHtml}</div><div class="overlay-actions"><button class="overlay-btn primary" onclick="eventStep3_Alert()">Next</button></div></div>`);
}

// --- STEP 3: Alert Check ---
function eventStep3_Alert(){
  if(!G.currentAlert){eventStep4_IntruderAttacks();return}

  showOverlay(`<div class="result-card"><div class="result-type-label">Event Phase \u2014 Step 3: Alert</div><div class="result-name" style="color:var(--warn);font-size:18px">${G.currentAlert.name}</div><div class="result-message">${G.currentAlert.text}<br><br>Timer: <em style="color:var(--danger)">${G.currentAlert.timer}</em></div><div class="private-prompt">Has this Alert been completed?</div><div class="overlay-actions"><button class="overlay-btn" style="border-color:var(--accent);color:var(--accent)" onclick="alertCompleted()">Yes, Completed</button><button class="overlay-btn danger" onclick="alertFailed()">No, Not Completed</button></div></div>`);
}

window.alertCompleted=function(){
  G.currentAlert=null;
  showOverlay(`<div class="result-card"><div class="result-type-label">Alert</div><div class="result-message centered"><em style="color:var(--accent)">Alert completed!</em> Timer reset. No alert is active.</div><div class="overlay-actions"><button class="overlay-btn primary" onclick="eventStep4_IntruderAttacks()">Next</button></div></div>`);
};

window.alertFailed=function(){
  G.currentAlert.timer--;
  if(G.currentAlert.timer<=0){
    G.gameOver=true;
    showOverlay(`<div class="result-card"><div class="result-type-label">Alert</div><div class="result-message centered" style="border-color:var(--danger)"><em style="color:var(--danger)">Alert timer reached 0 \u2014 the crew has failed. Game over!</em></div><div class="overlay-actions"><button class="overlay-btn primary" onclick="hideOverlay();updateUI()">End Game</button></div></div>`);
    return;
  }

window.eventRollAttack=function(type){
  const roll=rd(20),c=COLOR_MAP[type];
  let result=ATTACK_TABLE[type][roll];
  let weakNote='';
  if(result.startsWith('Summon')){
    doSummonDraw('eventStep4_IntruderAttacks()','Back to Attacks');
    return;
  }
  if(result.startsWith('Transformation')){

  if(result.startsWith('Bite')&&isWeaknessActive('The Way of Fighting')){
    result='Bite: 1 Light Wound (Way of Fighting)';
    weakNote='<br><span style="color:var(--warn);font-size:18px">(The Way of Fighting: Bite deals Light Wound)</span>';
  }
  const isMiss=result==='-- miss --';
  const col=isMiss?'var(--text-dim)':result.includes('Frenzy')||result.includes('Tail')||result.includes('Serious')?'var(--danger)':'var(--warn)';
  showOverlay(`<div class="result-card"><div class="result-type-label">Intruder Attack \u2014 ${type}</div><div class="result-name" style="color:${c};font-size:18px">${type}</div><div class="result-message centered"><span style="color:${col};font-size:18px">${result}</span>${weakNote}<br><br><span style="color:var(--text-dim);font-size:18px">Roll: ${roll+1}/20</span></div><div class="overlay-actions"><button class="overlay-btn primary" onclick="eventStep4_IntruderAttacks()">Back to Attacks</button></div></div>`);
};

// --- STEP 7: Draw Event + Alert Check ---
function eventStep7_EventAndAlert(){
  if(G.eventDraw.length===0){G.eventDraw=shuffle([...G.eventDiscard]);G.eventDiscard=[]}
  if(G.eventDraw.length===0){
    doAlertCheckAndShow('No events remaining in the deck.');
    return;
  }
  const event=G.eventDraw.shift();
  let removeMsg='';
  if(event.remove){
    G.removedEvents.push(event);
    G.eventDraw=shuffle([...G.eventDraw,...G.eventDiscard]);G.eventDiscard=[];
    removeMsg='<br><em style="color:var(--warn)">REMOVED from game. Deck reshuffled.</em>';
  } else {
    G.eventDiscard.push(event);
  }
  const baseHtml=`<div style="margin-bottom:4px;font-family:var(--font-display);font-size:18px;letter-spacing:2px;color:var(--creeper)">${event.name}</div><div style="font-size:18px;line-height:1.5;color:var(--text-dim)">${event.text}${removeMsg}</div>`;
  window._eventBaseHtml=baseHtml;

  // Check for interactive events
  const handler=EVENT_HANDLERS[event.name];
  if(handler){
    handler(baseHtml);
  } else {
    doAlertCheckAndShow(baseHtml);
  }
}

function doAlertCheckAndShow(eventHtml){
  let alertHtml='';
  const alertRoll=Math.random();
  const alertBlocked=G.currentAlert||G.timeMark<=8||G.alertDeck.length===0;
  if(!alertBlocked&&alertRoll<0.2){
    const alert=G.alertDeck.shift();
    G.currentAlert={name:alert.name,text:alert.text,timer:5};
    alertHtml=`<div style="margin-bottom:4px;font-family:var(--font-display);font-size:18px;letter-spacing:2px;color:var(--danger)">\u26A0 ALERT TRIGGERED!</div><div style="margin-bottom:4px;font-family:var(--font-display);font-size:18px;color:var(--warn)">${G.currentAlert.name}</div><div style="font-size:18px;line-height:1.5;color:var(--text-dim)">${G.currentAlert.text}<br>Alert Timer: <em style="color:var(--danger)">5</em></div>`;
  } else {
    const reason=G.currentAlert?'An alert is already active.':G.timeMark<=8?'Alerts ignored at Time Mark 8 or lower.':G.alertDeck.length===0?'No alerts remaining.':'No alert triggered.';
    alertHtml=`<div style="color:var(--text-dim);font-size:18px">${reason}</div>`;
  }
  updateUI();
  showOverlay(`<div class="result-card"><div class="result-type-label">Event Phase \u2014 Event & Alert</div><div class="result-message"><div style="padding-bottom:10px;margin-bottom:10px;border-bottom:1px solid var(--border)"><div style="font-family:var(--font-display);font-size:18px;letter-spacing:3px;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase">Event Card</div>${eventHtml}</div><div><div style="font-family:var(--font-display);font-size:18px;letter-spacing:3px;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase">Alert Check</div>${alertHtml}</div></div><div class="overlay-actions"><button class="overlay-btn primary" onclick="eventStep9_BagDev()">Next</button></div></div>`);
}

    let extra='';
    if(G.discoveredWeaknesses.length>0){
      const idx=rd(G.discoveredWeaknesses.length);
      const removedKey=G.discoveredWeaknesses.splice(idx,1)[0];
      const w=G.weaknesses[removedKey];
      G.discardedWeaknessTypes.push(removedKey);
      extra=`Discovered weakness discarded: <em style="color:var(--danger)">${w.name}</em> (${removedKey}). Its effects are removed. This weakness type can no longer be discovered.`;

      const flip=Math.random()<(1/3);
      if(flip){
        G.engines[i]=G.engines[i]==='Working'?'Damaged':'Working';

};

window.eventEncounterDraw=function(){
  if(!G.bag.length){
    showOverlay(`<div class="result-card"><div class="result-type-label">Event \u2014 Encounter</div><div class="result-message centered">The bag is empty. No token to draw.</div><div class="overlay-actions"><button class="overlay-btn primary" onclick="eventEncounterLoop(window._eventEncounterHtml)">Back</button></div></div>`);
    return;
  }
  const t=drawFromBag();
  if(t.name==='Blank'){
    const wasLast=G.bag.length===0;
    returnToBag(t);let added=false;
    if(wasLast){const a=getRandomFromSupply('Adult');if(a){returnToBag(a);added=true}}
    let m='<em style="color:var(--blank)">Blank</em> drawn. Returned to the bag.';
    if(added)m+='<br><em>The Blank was the last token \u2014 a random Adult has been added.</em>';
    updateUI();
    showOverlay(`<div class="result-card"><div class="result-type-label">Event \u2014 Encounter</div><div class="blank-icon">\u2205</div><div class="result-name" style="color:var(--blank)">Blank</div><div class="result-message centered">${m}</div><div class="overlay-actions"><button class="overlay-btn primary" onclick="eventEncounterLoop(window._eventEncounterHtml)">Continue</button></div></div>`);
  } else {
    returnToSupply(t);
    const c=COLOR_MAP[t.name];
    let dispInit=t.initiative;
    let initNote='';
    if(isWeaknessActive('Reaction to Danger')){dispInit=Math.max(1,dispInit-1);initNote='<br><span style="color:var(--warn);font-size:12px">(Reaction to Danger: \u22121 initiative)</span>'}
    updateUI();
    // Ask if intruder attacks
    showOverlay(`<div class="result-card"><div class="result-type-label">Event \u2014 Encounter</div><img class="result-image" src="${IMAGE_MAP[t.name]}" alt="${t.name}" style="--glow-color:${c};border-color:${c}" onerror="this.style.display='none'"><div class="result-name" style="color:${c}">${t.name}</div><div class="result-initiative">Initiative: <span>${dispInit}</span>${initNote}</div><div class="result-message centered">Token returned to supply.<br><br>Does this Intruder Attack?</div><div class="overlay-actions"><button class="overlay-btn danger" onclick="eventEncounterAttack('${t.name}')">Yes, Attacks</button><button class="overlay-btn" onclick="eventEncounterLoop(window._eventEncounterHtml)">No</button></div></div>`);
  }
};

window.eventEncounterAttack=function(type){
  if(type==='Larva'){
    showOverlay(`<div class="result-card"><div class="result-type-label">Intruder Attack \u2014 Larva</div><div class="result-name" style="color:var(--larva);font-size:18px">Larva</div><div class="result-message centered"><em style="color:var(--warn)">The attacked Character is now Infested.</em></div><div class="overlay-actions"><button class="overlay-btn primary" onclick="eventEncounterLoop(window._eventEncounterHtml)">Continue</button></div></div>`);
  } else {
    const roll=rd(20),c=COLOR_MAP[type];
    let result=ATTACK_TABLE[type][roll];
    let weakNote='';
    if(result.startsWith('Summon')){

    if(result.startsWith('Transformation')){

    }
    if(result.startsWith('Bite')&&isWeaknessActive('The Way of Fighting')){
      result='Bite: 1 Light Wound (Way of Fighting)';
      weakNote='<br><span style="color:var(--warn);font-size:12px">(The Way of Fighting: Bite deals Light Wound)</span>';
    }
    const isMiss=result==='-- miss --';
    const col=isMiss?'var(--text-dim)':result.includes('Frenzy')||result.includes('Tail')||result.includes('Serious')?'var(--danger)':'var(--warn)';
    showOverlay(`<div class="result-card"><div class="result-type-label">Intruder Attack \u2014 ${type}</div><div class="result-name" style="color:${c};font-size:18px">${type}</div><div class="result-message centered"><span style="color:${col};font-size:14px">${result}</span>${weakNote}<br><br><span style="color:var(--text-dim);font-size:12px">Roll: ${roll+1}/20</span></div><div class="overlay-actions"><button class="overlay-btn primary" onclick="eventEncounterLoop(window._eventEncounterHtml)">Continue</button></div></div>`);

    let m='Creeper removed to supply.';if(b){returnToBag(b);m+=` A <em>Breeder</em> (init ${b.initiative}) added to bag.`}else m+=' No Breeders in supply.';
    updateUI();
    showOverlay(`<div class="result-card"><div class="result-type-label">Event Phase \u2014 Bag Development</div><div class="result-name" style="color:${c}">${t.name}</div><div class="result-initiative">Initiative: <span>${t.initiative}</span></div><div class="result-message centered">${m}</div><div class="overlay-actions"><button class="overlay-btn primary" onclick="eventStep10_RoundEnd()">Next</button></div></div>`);
  } else if(t.name==='Adult'||t.name==='Breeder'){
    returnToBag(t);updateUI();
    showOverlay(`<div class="result-card"><div class="result-type-label">Event Phase \u2014 Bag Development</div><div class="result-name" style="color:${c}">${t.name}</div><div class="result-initiative">Initiative: <span>${t.initiative}</span></div><div class="result-message centered">${t.name} returned to the bag. No change.<br><br><em style="color:var(--warn)">Players not in Combat make noise rolls in Player order.</em></div><div class="overlay-actions"><button class="overlay-btn primary" onclick="eventStep10_RoundEnd()">Next</button></div></div>`);
  } else if(t.name==='Blank'){
    returnToBag(t);const a=getRandomFromSupply('Adult');
    let m='Blank returned to the bag.';if(a){returnToBag(a);m+=` A random <em>Adult</em> (init ${a.initiative}) added to bag.`}else m+=' No Adults in supply.';
    updateUI();
    showOverlay(`<div class="result-card"><div class="result-type-label">Event Phase \u2014 Bag Development</div><div class="blank-icon">\u2205</div><div class="result-name" style="color:var(--blank)">Blank</div><div class="result-message centered">${m}</div><div class="overlay-actions"><button class="overlay-btn primary" onclick="eventStep10_RoundEnd()">Next</button></div></div>`);
  } else if(t.name==='Queen'){
    window._epQueen=t;
    showOverlay(`<div class="result-card"><div class="result-type-label">Event Phase \u2014 Bag Development</div><div class="result-name" style="color:${c}">Queen</div><div class="result-initiative">Initiative: <span>${t.initiative}</span></div><div class="result-message centered">Are there any Characters in the <em>Nest Room</em>?</div><div class="overlay-actions"><button class="overlay-btn danger" onclick="epQueenNest(true)">Yes</button><button class="overlay-btn" onclick="epQueenNest(false)">No</button></div></div>`);
  }
}

window.epQueenNest=function(yes){
  const t=window._epQueen;
  if(yes){
    returnToSupply(t);updateUI();
    showOverlay(`<div class="result-card"><div class="result-type-label">Event Phase \u2014 Bag Development</div><div class="result-name" style="color:var(--queen)">Queen</div><div class="result-message centered" style="border-color:var(--queen)"><em style="color:var(--queen);font-size:18px">The Queen appears in the Nest!</em></div><div class="overlay-actions"><button class="overlay-btn primary" onclick="eventStep10_RoundEnd()">Next</button></div></div>`);
  } else {
    returnToBag(t);
    if(!G.nest.destroyed)G.nest.eggs++;
    updateUI();
    showOverlay(`<div class="result-card"><div class="result-type-label">Event Phase \u2014 Bag Development</div><div class="result-name" style="color:var(--queen)">Queen</div><div class="result-message centered">Queen returned to the bag.<br><br><em style="color:var(--warn)">An Egg has been added to the Nest.</em> (Eggs: ${G.nest.eggs})</div><div class="overlay-actions"><button class="overlay-btn primary" onclick="eventStep10_RoundEnd()">Next</button></div></div>`);
  }
  window._epQueen=null;
};

// --- STEP 10: Round End ---
function eventStep10_RoundEnd(){
  // Rotate first player to next alive player
  const aliveNums=G.players.filter(p=>p.alive&&!p.inHibernation&&!p.inEscapePod).map(p=>p.number).sort((a,b)=>a-b);
  if(aliveNums.length){
    const curIdx=aliveNums.indexOf(G.firstPlayer);
    if(curIdx===-1||curIdx>=aliveNums.length-1) G.firstPlayer=aliveNums[0];
    else G.firstPlayer=aliveNums[curIdx+1];
  }

  G.phase='player';
  updateUI();

  showOverlay(`<div class="result-card"><div class="result-type-label">Round Complete</div><div class="result-message centered">Event Phase complete!<br><br>Time Mark: <em style="color:var(--accent)">${G.timeMark}</em><br>Bag: <em style="color:var(--accent)">${G.bag.length}</em> tokens<br><br>First Player is now: <em style="color:var(--accent)">${firstPlayerName()}</em></div><div class="overlay-actions"><button class="overlay-btn primary" onclick="hideOverlay()">Begin Player Phase</button></div></div>`);
}

// ============================================================
// RESET
// ============================================================
document.getElementById('reset-btn').addEventListener('click',()=>{
  showOverlay(`<div class="result-card"><div class="result-type-label">Confirm Reset</div><div class="result-message centered">End current game and return to setup?</div><div class="overlay-actions"><button class="overlay-btn danger" onclick="doReset()">Reset</button><button class="overlay-btn" onclick="hideOverlay()">Cancel</button></div></div>`);
});
window.doReset=function(){
  G=freshState();selectedCount=0;debugOn=false;
  document.querySelectorAll('.player-btn').forEach(b=>b.classList.remove('selected'));
  btnToNames.classList.remove('ready');
  document.getElementById('debug-toggle').classList.remove('on');
  document.getElementById('debug-contents').classList.remove('visible');
  hideOverlay();showScreen('setup-count');
};

// ============================================================
// DEBUG
// ============================================================
document.getElementById('debug-toggle').addEventListener('click',()=>{
  debugOn=!debugOn;
  document.getElementById('debug-toggle').classList.toggle('on',debugOn);
  document.getElementById('debug-contents').classList.toggle('visible',debugOn);
  updateDebug();
});
function updateDebug(){
  if(!debugOn)return;
  const el=document.getElementById('debug-contents');
  const bs=[...G.bag].sort((a,b)=>a.name.localeCompare(b.name)||a.initiative-b.initiative);
  const ss=[...G.supply].sort((a,b)=>a.name.localeCompare(b.name)||a.initiative-b.initiative);
  el.innerHTML=`
    <div style="margin-bottom:3px"><b style="color:var(--accent)">BAG(${G.bag.length}):</b> ${bs.map(t=>`<span class="tag tag-${t.name}">${t.name}${t.initiative?':'+t.initiative:''}</span>`).join(' ')}</div>
    <div style="margin-bottom:3px"><b style="color:var(--text-dim)">SUPPLY(${G.supply.length}):</b> ${ss.map(t=>`<span class="tag tag-${t.name}">${t.name}${t.initiative?':'+t.initiative:''}</span>`).join(' ')}</div>
    <div style="margin-bottom:3px"><b style="color:var(--accent)">ENG:</b> ${[1,2,3].map(i=>`<span style="color:${G.engines[i]==='Working'?'var(--accent)':'var(--danger)'}">${i}:${G.engines[i]}</span>`).join(' ')}</div>
    <div style="margin-bottom:3px"><b style="color:var(--accent)">COORD:</b> ${Object.entries(G.coordinates).map(([l,d])=>l+'\u2192'+d).join(' ')} | Dest:${G.shipDestination}</div>
    <div style="margin-bottom:3px"><b style="color:var(--accent)">PODS:</b> ${G.escapePods.map(p=>p.id+':'+(p.launched?'GONE':p.locked?'Lock':'Open')+(p.occupants.length?'('+p.occupants+')':'')).join(' ')}</div>
    <div style="margin-bottom:3px"><b style="color:var(--accent)">WEAK:</b> Corp\u2192${G.weaknesses.characterCorpse?.name||'?'} | Egg\u2192${G.weaknesses.intruderEgg?.name||'?'} | Carc\u2192${G.weaknesses.intruderCarcass?.name||'?'} | Found:${G.discoveredWeaknesses.join(',')||'none'}</div>
    <div style="margin-bottom:3px"><b style="color:var(--accent)">MAL/FIRE:</b> Mal:${G.malfunctionCount} Fire:${G.fireCount} | Queen:${G.queenKilled?'DEAD':'alive'}</div>
    <div><b style="color:var(--accent)">EVENTS:</b> Draw:${G.eventDraw.length} Disc:${G.eventDiscard.length} Rm:${G.removedEvents.length} | <b>ALERTS:</b> Deck:${G.alertDeck.length} Active:${G.currentAlert?G.currentAlert.name:'none'}</div>`;
}
</script>
</body>
